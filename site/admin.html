<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Admin Panel &mdash; ALTIVOR INSTITUTE</title>
<link rel="stylesheet" href="styles.css?v=20250419" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
<style>
/* ═══ ADMIN PANEL ═════════════════════════════════════════════════════════ */
:root,[data-theme="dark"]{--adm-accent:rgba(168,85,247,.85);--adm-accent-soft:rgba(168,85,247,.1);--adm-accent-border:rgba(168,85,247,.4)}
[data-theme="light"]{--adm-accent:rgba(126,34,206,.85);--adm-accent-soft:rgba(126,34,206,.07);--adm-accent-border:rgba(126,34,206,.3)}
[data-theme="navy"]{--adm-accent:rgba(192,132,252,.85);--adm-accent-soft:rgba(192,132,252,.1);--adm-accent-border:rgba(192,132,252,.4)}

.adm-gate{text-align:center;padding:8rem 1rem;min-height:80vh}
.adm-gate h2{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--txt-primary);margin-bottom:.5rem}
.adm-gate p{color:var(--txt-secondary);font-size:.88rem}

.adm-wrap{max-width:1200px;margin:0 auto;padding:7rem 1.5rem 4rem}
.adm-header{margin-bottom:1.5rem}
.adm-header h1{font-family:'DM Serif Display',serif;font-size:1.75rem;color:var(--txt-primary);margin:0 0 .25rem}
.adm-header p{color:var(--txt-secondary);font-size:.82rem;margin:0}

.adm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.adm-stat{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:.85rem;padding:1.1rem 1rem;text-align:center}
.adm-stat-val{font-family:'DM Serif Display',serif;font-size:1.5rem;color:var(--txt-primary);line-height:1.2}
.adm-stat-lbl{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-muted);margin-top:.25rem}

.adm-toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1rem;flex-wrap:wrap}
.adm-toolbar input{flex:1;min-width:200px;padding:.5rem .75rem;font-size:.82rem;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:.5rem;color:var(--txt-primary);font-family:inherit}
.adm-toolbar input:focus{outline:none;border-color:var(--adm-accent-border);box-shadow:0 0 0 3px var(--adm-accent-soft)}

.adm-table-wrap{overflow-x:auto;border:1px solid var(--border-subtle);border-radius:1rem;background:var(--bg-card)}
.adm-table{width:100%;border-collapse:collapse;font-size:.8rem}
.adm-table th{text-align:left;padding:.7rem .75rem;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txt-muted);border-bottom:1px solid var(--border-default);background:var(--bg-elevated)}
.adm-table td{padding:.6rem .75rem;border-bottom:1px solid var(--border-subtle);color:var(--txt-primary);white-space:nowrap}
.adm-table tr:last-child td{border-bottom:none}
.adm-table tr:hover td{background:var(--bg-elevated)}

.adm-pill{display:inline-block;padding:2px 10px;border-radius:100px;font-size:.65rem;font-weight:700;letter-spacing:.03em;text-transform:uppercase}
.adm-pill--admin{background:rgba(168,85,247,.12);color:#a855f7}
.adm-pill--authenticated,.adm-pill--user{background:rgba(100,116,139,.1);color:var(--txt-secondary)}
.adm-pill--confirmed{background:rgba(34,197,94,.1);color:#22c55e}
.adm-pill--unconfirmed{background:rgba(234,179,8,.1);color:#eab308}
.adm-pill--banned{background:rgba(239,68,68,.12);color:#ef4444}
[data-theme="light"] .adm-pill--admin{color:#7c3aed}
[data-theme="light"] .adm-pill--confirmed{color:#15803d}
[data-theme="light"] .adm-pill--unconfirmed{color:#a16207}
[data-theme="light"] .adm-pill--banned{color:#dc2626}

.adm-edit-btn{background:none;border:1px solid var(--border-default);color:var(--txt-secondary);padding:3px 10px;border-radius:6px;font-size:.72rem;cursor:pointer;transition:border-color .15s,color .15s;font-family:inherit}
.adm-edit-btn:hover{border-color:var(--adm-accent-border);color:var(--adm-accent)}

.adm-empty{text-align:center;padding:3rem;color:var(--txt-muted);font-size:.88rem}
.adm-loading{text-align:center;padding:2rem;color:var(--txt-muted);font-size:.82rem}

/* Edit modal */
.adm-modal-overlay{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);backdrop-filter:blur(4px)}
.adm-modal-overlay.open{display:flex}
.adm-modal{background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:1.25rem;padding:2rem;max-width:480px;width:92%;box-shadow:0 24px 48px rgba(0,0,0,.25)}
.adm-modal h3{font-family:'DM Serif Display',serif;font-size:1.15rem;color:var(--txt-primary);margin:0 0 .25rem}
.adm-modal-email{font-size:.78rem;color:var(--txt-muted);margin:0 0 1.25rem;word-break:break-all}
.adm-modal-field{margin-bottom:1rem}
.adm-modal-field label{display:block;font-size:.7rem;font-weight:600;color:var(--txt-secondary);margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.06em}
.adm-modal-field select,.adm-modal-field input{width:100%;padding:.5rem .65rem;font-size:.82rem;background:var(--bg-surface);border:1px solid var(--border-default);border-radius:.5rem;color:var(--txt-primary);font-family:inherit}
.adm-modal-field input:disabled{opacity:.45}
.adm-modal-actions{display:flex;gap:.5rem;margin-top:1.25rem}
.adm-modal-status{font-size:.78rem;margin-top:.5rem;min-height:1.2em}
.adm-modal-status.ok{color:#22c55e}
.adm-modal-status.err{color:#ef4444}

.adm-mono{font-family:'Courier New',monospace;font-size:.7rem;word-break:break-all;max-width:120px;overflow:hidden;text-overflow:ellipsis}

@media(max-width:860px){
.adm-stats{grid-template-columns:1fr 1fr}
}
@media(max-width:640px){
.adm-stats{grid-template-columns:1fr}
.adm-toolbar{flex-direction:column}
}
</style>
</head>
<body>
<!-- GATE: shown when not admin -->
<div id="admGate" class="adm-gate" style="display:none;">
<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--txt-muted)" stroke-width="1.2" style="opacity:.3;margin-bottom:1rem;"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
<h2>Access Restricted</h2>
<p>This page is only available to authorized administrators.</p>
<p style="margin-top:1.5rem;"><a href="index.html" class="btn btn-primary">Return to Home</a></p>
</div>

<!-- ADMIN PANEL: shown when admin -->
<div id="admPanel" class="adm-wrap" style="display:none;">
<div class="adm-header">
<h1>Admin Panel</h1>
<p>Manage users, subscriptions, and account statuses.</p>
</div>

<!-- Stats -->
<div class="adm-stats">
<div class="adm-stat"><div class="adm-stat-val" id="admStatTotal">—</div><div class="adm-stat-lbl">Total Users</div></div>
<div class="adm-stat"><div class="adm-stat-val" id="admStatConfirmed">—</div><div class="adm-stat-lbl">Confirmed</div></div>
<div class="adm-stat"><div class="adm-stat-val" id="admStatToday">—</div><div class="adm-stat-lbl">Signed Up Today</div></div>
<div class="adm-stat"><div class="adm-stat-val" id="admStatBanned">—</div><div class="adm-stat-lbl">Banned</div></div>
</div>

<!-- Toolbar -->
<div class="adm-toolbar">
<input type="text" id="admSearch" placeholder="Search by email or name..." />
<button class="btn btn-ghost btn-sm" id="admRefresh">Refresh</button>
</div>

<!-- Table -->
<div class="adm-table-wrap">
<table class="adm-table">
<thead><tr>
<th>Email</th>
<th>Name</th>
<th>Role</th>
<th>Email Status</th>
<th>Created</th>
<th>Last Sign In</th>
<th>Provider</th>
<th></th>
</tr></thead>
<tbody id="admTableBody">
<tr><td colspan="8" class="adm-loading">Loading users...</td></tr>
</tbody>
</table>
</div>
</div>

<!-- Edit Modal -->
<div class="adm-modal-overlay" id="admEditOverlay">
<div class="adm-modal">
<h3>Edit User</h3>
<p class="adm-modal-email" id="admEditEmail"></p>
<input type="hidden" id="admEditId" />
<div class="adm-modal-field">
<label>User ID</label>
<input type="text" id="admEditUid" disabled />
</div>
<div class="adm-modal-field">
<label>Display Name</label>
<input type="text" id="admEditName" placeholder="First Last" />
</div>
<div class="adm-modal-field">
<label>Ban User</label>
<select id="admEditBan">
<option value="">Not Banned</option>
<option value="banned">Banned</option>
</select>
</div>
<div class="adm-modal-actions">
<button class="btn btn-ghost btn-sm" id="admEditClose">Cancel</button>
<button class="btn btn-primary btn-sm" id="admEditSave">Save Changes</button>
</div>
<p class="adm-modal-status" id="admEditStatus"></p>
</div>
</div>

<!-- Scripts -->
<script src="script.js"></script>
<script src="i18n.js"></script>
<script src="auth-modals.js"></script>

<script>
(function () {
    'use strict';

    var SUPA_URL = 'https://lssedurdadjngqbchjbj.supabase.co';
    var SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxzc2VkdXJkYWRqbmdxYmNoamJqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjU1OTk5OSwiZXhwIjoyMDkyMTM1OTk5fQ.IIwv1FAui_6ScsNAbuv-HmRxvBJkWZGtMmSCUyAmJYA';
    var ADMIN_EMAIL = 'aleksanderdobieszewski@gmail.com';
    var SESSION_KEY = 'altivor_session';

    /* ── Helpers ── */
    function $(id) { return document.getElementById(id); }
    function escHtml(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function fmtDate(iso) { if (!iso) return '\u2014'; var d = new Date(iso); return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
    function fmtDateTime(iso) { if (!iso) return '\u2014'; var d = new Date(iso); return fmtDate(iso) + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }); }

    function adminApi(path, method, body) {
        var h = { 'apikey': SERVICE_KEY, 'Authorization': 'Bearer ' + SERVICE_KEY, 'Content-Type': 'application/json' };
        var opts = { method: method || 'GET', headers: h };
        if (body) opts.body = JSON.stringify(body);
        return fetch(SUPA_URL + path, opts).then(function (r) {
            return r.json().then(function (d) {
                if (!r.ok) throw new Error(d.msg || d.message || d.error_description || 'Request failed');
                return d;
            });
        });
    }

    /* ── Gate check ── */
    function getLoggedInEmail() {
        try {
            var s = JSON.parse(localStorage.getItem(SESSION_KEY));
            if (!s || !s.user) return null;
            return (s.user.email || '').trim().toLowerCase();
        } catch (_) { return null; }
    }

    var email = getLoggedInEmail();
    if (email !== ADMIN_EMAIL) {
        $('admGate').style.display = '';
        return;
    }
    $('admPanel').style.display = '';

    /* ── State ── */
    var allUsers = [];

    /* ── Load users ── */
    function loadUsers() {
        $('admTableBody').innerHTML = '<tr><td colspan="8" class="adm-loading">Loading users...</td></tr>';

        adminApi('/auth/v1/admin/users?per_page=1000', 'GET')
            .then(function (data) {
                allUsers = data.users || [];
                updateStats();
                renderTable(allUsers);
            })
            .catch(function (err) {
                $('admTableBody').innerHTML = '<tr><td colspan="8" class="adm-empty">Failed to load: ' + escHtml(err.message) + '</td></tr>';
            });
    }

    function updateStats() {
        $('admStatTotal').textContent = allUsers.length;
        var confirmed = allUsers.filter(function (u) { return u.email_confirmed_at; }).length;
        $('admStatConfirmed').textContent = confirmed;
        var today = new Date().toISOString().slice(0, 10);
        var todayCount = allUsers.filter(function (u) { return u.created_at && u.created_at.slice(0, 10) === today; }).length;
        $('admStatToday').textContent = todayCount;
        var banned = allUsers.filter(function (u) { return u.banned_until && new Date(u.banned_until) > new Date(); }).length;
        $('admStatBanned').textContent = banned;
    }

    function renderTable(users) {
        if (!users.length) {
            $('admTableBody').innerHTML = '<tr><td colspan="8" class="adm-empty">No users found.</td></tr>';
            return;
        }
        var html = '';
        users.forEach(function (u) {
            var meta = u.user_metadata || {};
            var name = ((meta.first_name || '') + ' ' + (meta.last_name || '')).trim() || meta.username || '\u2014';
            var isAdmin = (u.email || '').trim().toLowerCase() === ADMIN_EMAIL;
            var roleCls = isAdmin ? 'admin' : 'authenticated';
            var roleLabel = isAdmin ? 'admin' : (u.role || 'user');
            var emailConfirmed = u.email_confirmed_at;
            var emailCls = emailConfirmed ? 'confirmed' : 'unconfirmed';
            var emailLabel = emailConfirmed ? 'Confirmed' : 'Unconfirmed';
            var isBanned = u.banned_until && new Date(u.banned_until) > new Date();
            if (isBanned) { emailCls = 'banned'; emailLabel = 'Banned'; }
            var provider = (u.app_metadata && u.app_metadata.provider) || 'email';

            html += '<tr data-uid="' + u.id + '">'
                + '<td>' + escHtml(u.email) + '</td>'
                + '<td>' + escHtml(name) + '</td>'
                + '<td><span class="adm-pill adm-pill--' + roleCls + '">' + escHtml(roleLabel) + '</span></td>'
                + '<td><span class="adm-pill adm-pill--' + emailCls + '">' + escHtml(emailLabel) + '</span></td>'
                + '<td>' + fmtDate(u.created_at) + '</td>'
                + '<td>' + fmtDateTime(u.last_sign_in_at) + '</td>'
                + '<td>' + escHtml(provider) + '</td>'
                + '<td><button class="adm-edit-btn" data-uid="' + u.id + '">Edit</button></td>'
                + '</tr>';
        });
        $('admTableBody').innerHTML = html;
    }

    /* ── Search ── */
    $('admSearch').addEventListener('input', function () {
        var q = this.value.trim().toLowerCase();
        if (!q) { renderTable(allUsers); return; }
        var filtered = allUsers.filter(function (u) {
            var meta = u.user_metadata || {};
            var name = ((meta.first_name || '') + ' ' + (meta.last_name || '') + ' ' + (meta.username || '')).toLowerCase();
            return (u.email || '').toLowerCase().indexOf(q) !== -1 || name.indexOf(q) !== -1;
        });
        renderTable(filtered);
    });

    /* ── Refresh ── */
    $('admRefresh').addEventListener('click', loadUsers);

    /* ── Edit modal ── */
    var overlay = $('admEditOverlay');
    function openEdit(uid) {
        var user = allUsers.find(function (u) { return u.id === uid; });
        if (!user) return;
        var meta = user.user_metadata || {};
        $('admEditId').value = user.id;
        $('admEditUid').value = user.id;
        $('admEditEmail').textContent = user.email;
        $('admEditName').value = ((meta.first_name || '') + (meta.last_name ? ' ' + meta.last_name : '')).trim();
        var isBanned = user.banned_until && new Date(user.banned_until) > new Date();
        $('admEditBan').value = isBanned ? 'banned' : '';
        $('admEditStatus').textContent = '';
        $('admEditStatus').className = 'adm-modal-status';
        overlay.classList.add('open');
    }
    function closeEdit() { overlay.classList.remove('open'); }

    $('admEditClose').addEventListener('click', closeEdit);
    overlay.addEventListener('click', function (e) { if (e.target === overlay) closeEdit(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && overlay.classList.contains('open')) closeEdit(); });

    $('admTableBody').addEventListener('click', function (e) {
        var btn = e.target.closest('.adm-edit-btn');
        if (btn) openEdit(btn.dataset.uid);
    });

    $('admEditSave').addEventListener('click', function () {
        var uid = $('admEditId').value;
        var statusEl = $('admEditStatus');
        var saveBtn = $('admEditSave');
        saveBtn.disabled = true;
        statusEl.textContent = '';
        statusEl.className = 'adm-modal-status';

        var nameVal = ($('admEditName').value || '').trim();
        var nameParts = nameVal.split(/\s+/);
        var firstName = nameParts[0] || '';
        var lastName = nameParts.slice(1).join(' ') || '';

        var banVal = $('admEditBan').value;
        var body = {
            user_metadata: { first_name: firstName, last_name: lastName }
        };
        if (banVal === 'banned') {
            body.ban_duration = '876000h'; // ~100 years
        } else {
            body.ban_duration = 'none';
        }

        adminApi('/auth/v1/admin/users/' + uid, 'PUT', body)
            .then(function (updated) {
                allUsers = allUsers.map(function (u) { return u.id === updated.id ? updated : u; });
                updateStats();
                renderTable(allUsers);
                statusEl.textContent = 'Saved successfully.';
                statusEl.className = 'adm-modal-status ok';
                setTimeout(closeEdit, 800);
            })
            .catch(function (err) {
                statusEl.textContent = err.message || 'Failed to save.';
                statusEl.className = 'adm-modal-status err';
            })
            .then(function () { saveBtn.disabled = false; });
    });

    /* ── Init ── */
    loadUsers();
})();
</script>
</body>
</html>
